        function formatMessageContent(content) {
            if (!content) return '';
            let text = escapeHtml(content);

            // Convert http:// and https:// URLs to clickable links opening in a new tab
            const httpUrlRegex = /(https?:\/\/[^\s<]+)/gi;
            text = text.replace(httpUrlRegex, function(url) {
                // If it's a direct video file (.mp4, .webm, .ogv), render link + video player
                if (/\.(mp4|webm|ogv)(\?.*)?$/i.test(url)) {
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color: var(--primary-color); text-decoration: underline;">${url}</a><br><video controls src="${url}" style="max-width: 100%; max-height: 320px; border-radius: 8px; margin-top: 6px; display: block;"></video>`;
                }
                return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color: var(--primary-color); text-decoration: underline;">${url}</a>`;
            });

            // Convert www. URLs (without http:// or https://) to clickable links
            const wwwUrlRegex = /(^|[^\/])(www\.[^\s<]+)/gi;
            text = text.replace(wwwUrlRegex, function(match, prefix, wwwUrl) {
                return `${prefix}<a href="https://${wwwUrl}" target="_blank" rel="noopener noreferrer" style="color: var(--primary-color); text-decoration: underline;">${wwwUrl}</a>`;
            });

            // Convert classic MSN Messenger text shortcuts & emoticons to emojis
            text = text.replace(/(?<=^|\s)\(H\)(?=\s|$)/gi, '😎')
                       .replace(/(?<=^|\s)\(A\)(?=\s|$)/gi, '😇')
                       .replace(/(?<=^|\s)\(6\)(?=\s|$)/gi, '😈')
                       .replace(/(?<=^|\s)\(Y\)(?=\s|$)/gi, '👍')
                       .replace(/(?<=^|\s)\(N\)(?=\s|$)/gi, '👎')
                       .replace(/(?<=^|\s)\(K\)(?=\s|$)/gi, '💋')
                       .replace(/(?<=^|\s)\(L\)(?=\s|$)/gi, '❤️')
                       .replace(/(?<=^|\s)\(U\)(?=\s|$)/gi, '💔')
                       .replace(/(?<=^|\s)\(P\)(?=\s|$)/gi, '🍕')
                       .replace(/(?<=^|\s)\(B\)(?=\s|$)/gi, '🍺')
                       .replace(/(?<=^|\s)\(M\)(?=\s|$)/gi, '💬')
                       .replace(/(?<=^|\s)\(F\)(?=\s|$)/gi, '🌹')
                       .replace(/(?<=^|\s)\(S\)(?=\s|$)/gi, '🌙')
                       .replace(/(?<=^|\s)\(O\)(?=\s|$)/gi, '⏰')
                       .replace(/(?<=^|\s)\(G\)(?=\s|$)/gi, '🎁')
                       .replace(/(?<=^|\s):D(?=\s|$)/g, '😀')
                       .replace(/(?<=^|\s):-D(?=\s|$)/g, '😀')
                       .replace(/(?<=^|\s):\)(?=\s|$)/g, '😊')
                       .replace(/(?<=^|\s):-\)(?=\s|$)/g, '😊')
                       .replace(/(?<=^|\s);\)(?=\s|$)/g, '😉')
                       .replace(/(?<=^|\s);-\)(?=\s|$)/g, '😉')
                       .replace(/(?<=^|\s)&lt;3(?=\s|$)/g, '❤️')
                       .replace(/(?<=^|\s):P(?=\s|$)/gi, '😜')
                       .replace(/(?<=^|\s):-\((?=\s|$)/g, '🙁')
                       .replace(/(?<=^|\s):\((?=\s|$)/g, '🙁');

            return text;
        }

        function jumpToMessage(msgId) {
            if (!msgId) return;
            const el = document.getElementById('msg-' + msgId);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.transition = 'outline 0.3s, transform 0.3s';
                el.style.outline = '3px solid var(--primary-color)';
                el.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    el.style.outline = 'none';
                    el.style.transform = 'none';
                }, 1500);
            } else {
                showNotification('Az eredeti üzenet nem található ebben a nézetben.', 'error');
            }
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            
            if (!currentTopic || !data.messages[currentTopic]) {
                container.innerHTML = '<div class="empty-state">Válassz egy topikot a beszélgetéshez</div>';
                return;
            }

            const messages = data.messages[currentTopic];
            container.innerHTML = '';

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.id = 'msg-' + msg.id;
                div.className = 'message' + (msg.username === username ? ' own' : '');
                
                const date = new Date(msg.timestamp);
                const timeStr = date.toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit' });
                
                let replyQuoteHtml = '';
                if (msg.replyTo) {
                    const replyText = msg.replyTo.content ? msg.replyTo.content.substring(0, 70) : (msg.replyTo.attachment ? '📎 Csatolt fájl' : '');
                    replyQuoteHtml = `
                        <div class="message-reply-quote" onclick="jumpToMessage('${msg.replyTo.id}')" style="cursor: pointer;" title="Kattints az eredeti üzenethez ugráshoz 🎯">
                            <strong>@${escapeHtml(msg.replyTo.username)}</strong>: ${escapeHtml(replyText)}${msg.replyTo.content && msg.replyTo.content.length > 70 ? '...' : ''}
                        </div>
                    `;
                }

                let attachmentHtml = '';
                if (msg.attachment) {
                    const fileId = msg.attachment.fileId;
                    const uploaderId = msg.attachment.uploaderPeerId || msg.username;
                    const isUploaderOnline = connections.some(c => c.peer === uploaderId && c.open) || (peer && uploaderId === peer.id);
                    const fileObj = fileId ? hostedFiles[fileId] : (msg.attachment.data ? msg.attachment : null);

                    if (fileObj && fileObj.data) {
                        const isImg = fileObj.type && fileObj.type.startsWith('image/');
                        const isVideo = fileObj.type && fileObj.type.startsWith('video/');
                        if (isImg) {
                            attachmentHtml = `
                                <div class="message-attachment">
                                    <a href="${fileObj.data}" target="_blank">
                                        <img src="${fileObj.data}" alt="${escapeHtml(fileObj.name)}" title="Kattints a nagyításhoz">
                                    </a>
                                </div>
                            `;
                        } else if (isVideo) {
                            attachmentHtml = `
                                <div class="message-attachment">
                                    <video controls src="${fileObj.data}" style="max-width: 100%; max-height: 320px; border-radius: 8px; display: block;"></video>
                                </div>
                            `;
                        } else {
                            const sizeStr = formatFileSize(fileObj.size || 0);
                            attachmentHtml = `
                                <div class="message-attachment">
                                    <a href="${fileObj.data}" download="${escapeHtml(fileObj.name)}" class="file-download-box">
                                        <span>📎</span>
                                        <span><strong>${escapeHtml(fileObj.name)}</strong> (${sizeStr})</span>
                                        <span>📥</span>
                                    </a>
                                </div>
                            `;
                        }
                    } else {
                        const sizeStr = formatFileSize(msg.attachment.size || 0);
                        attachmentHtml = `
                            <div class="message-attachment">
                                <div class="file-download-box" style="display: flex; flex-direction: column; align-items: flex-start; gap: 4px;">
                                    <div>📎 <strong>${escapeHtml(msg.attachment.name)}</strong> (${sizeStr})</div>
                                    <div style="font-size: 11px; opacity: 0.7;">Feltöltő: @${escapeHtml(uploaderId)} (${isUploaderOnline ? '🟢 Online' : '🔴 Offline'})</div>
                                    <button class="btn btn-primary" onclick="downloadP2PFile('${fileId}', '${uploaderId}')" style="margin-top: 4px; font-size: 12px; padding: 4px 10px;">
                                        ${isUploaderOnline ? '📥 P2P Letöltés indítása' : '🔴 Feltöltő offline'}
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                }

                const formattedContent = msg.content ? formatMessageContent(msg.content) : '';
                const msgContentForReply = JSON.stringify(msg.content || (msg.attachment ? msg.attachment.name : '')).replace(/'/g, "\\'");
                
                div.innerHTML = `
                    <div>
                        <span class="username">${escapeHtml(msg.username)}</span>
                        <span class="timestamp">${timeStr}</span>
                        <button class="reply-btn" onclick='startReply("${msg.id}", "${escapeHtml(msg.username)}", ${msgContentForReply})' title="Válasz erre az üzenetre">↩️ Válasz</button>
                    </div>
                    ${replyQuoteHtml}
                    ${formattedContent ? `<div class="content">${formattedContent}</div>` : ''}
                    ${attachmentHtml}
                `;
                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
        }

        function saveDeletedTopics() {
            localStorage.setItem('p2p_deleted_topics', JSON.stringify(deletedTopicIds));
        }

        function loadDeletedTopics() {
            const saved = localStorage.getItem('p2p_deleted_topics');
            if (saved) {
                try {
                    deletedTopicIds = JSON.parse(saved);
                } catch (e) {
                    console.error('Error loading deleted topics:', e);
                    deletedTopicIds = [];
                }
            }
        }

        // Data persistence
        function saveData() {
            localStorage.setItem('p2p_reddit_data', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('p2p_reddit_data');
            if (saved) {
                data = JSON.parse(saved);
            }
        }

        function clearAllData() {
            if (confirm('Biztosan törölni akarod az összes adatot? Ez nem visszavonható!')) {
                localStorage.removeItem('p2p_reddit_data');
                localStorage.removeItem('p2p_username');
                localStorage.removeItem('p2p_known_users');
                localStorage.removeItem('p2p_deleted_topics');
                // Note: We keep p2p_peer_id to maintain identity
                data = { topics: {}, messages: {} };
                knownUsers = {};
                deletedTopicIds = [];
                currentTopic = null;
                renderTopics();
                renderMessages();
                renderUserList();
                showNotification('Összes adat törölve!');
                
                setTimeout(() => {
                    location.reload();
                }, 1000);
            }
        }

        // Utilities
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            
            if (type === 'error') {
                notification.style.background = '#ef4444';
            }
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Start
        init();
    </script>
</body>
</html>
